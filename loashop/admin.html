<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Loa</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0d0c0a;
            --bg-light: #ebe6dc;
            --text-on-dark: #ebe6dc;
            --text-on-dark-muted: rgba(235,230,220,0.65);
            --text-on-light: #17140f;
            --text-on-light-muted: rgba(23,20,15,0.55);
            --neutral-50: #f4f1ea;
            --neutral-100: #e8e3d8;
            --neutral-200: #d8d2c4;
            --neutral-300: #c4bdac;
            --neutral-400: #8f8b82;
            --neutral-600: #5a564c;
            --neutral-900: #221e18;
            --danger: #8a3b30;
            --danger-bright: #b8543f;
            --ok: #4d6e52;
            --font-display: 'Bodoni Moda', 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --font-mono: 'Space Mono', 'SF Mono', 'Courier New', monospace;
            --radius-sm: 10px;
            --radius-md: 20px;
            --radius-full: 999px;
            --shadow-sm: 0 2px 12px rgba(0,0,0,0.12);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); background: var(--neutral-50); color: var(--text-on-light); min-height: 100vh; }

        .nav { background: var(--bg-dark); color: var(--text-on-dark); padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
        .nav-title { font-family: var(--font-display); font-size: 19px; letter-spacing: 0.5px; }
        .nav-links a { font-family: var(--font-mono); color: var(--text-on-dark-muted); text-decoration: none; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 20px; border-bottom: 1px solid transparent; padding-bottom: 2px; transition: color 0.15s, border-color 0.15s; }
        .nav-links a:hover { color: var(--text-on-dark); border-color: var(--text-on-dark-muted); }

        .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
        .section-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--neutral-400); margin: 40px 0 16px; }
        .section-label:first-child { margin-top: 0; }

        .login-box { max-width: 380px; margin: 100px auto; background: #fff; padding: 36px 32px; border-radius: var(--radius-md); box-shadow: var(--shadow-lg); }
        .login-box h2 { font-family: var(--font-display); font-weight: 400; font-size: 28px; margin-bottom: 20px; }

        label.field-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--neutral-400); display: block; margin-bottom: 4px; }
        input[type=text], input[type=number], input[type=email], input[type=password], textarea, select {
            width: 100%; padding: 12px 14px; border: 1.5px solid var(--neutral-200); border-radius: var(--radius-sm);
            margin-bottom: 12px; font-size: 14px; font-family: var(--font-body); background: #fff; color: var(--text-on-light);
        }
        textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
        input:focus, textarea:focus, select:focus { outline: 2px solid var(--text-on-light); outline-offset: 1px; }

        button { cursor: pointer; border: none; border-radius: var(--radius-full); padding: 11px 20px; font-size: 12px; font-weight: 600; font-family: var(--font-mono); letter-spacing: 1px; text-transform: uppercase; }
        .btn-primary { background: var(--bg-dark); color: var(--text-on-dark); width: 100%; padding: 14px; }
        .btn-primary:hover { background: var(--neutral-900); }
        .btn-danger { background: none; color: var(--danger); border: 1.5px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-ghost { background: none; color: var(--text-on-light-muted); border: 1.5px solid var(--neutral-200); }
        .btn-ghost:hover { border-color: var(--text-on-light); color: var(--text-on-light); }

        .card { background: #fff; border-radius: var(--radius-md); padding: 24px; margin-bottom: 18px; box-shadow: var(--shadow-sm); }
        .card-tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--neutral-400); margin-bottom: 6px; }
        .card h3 { font-family: var(--font-display); font-weight: 400; font-size: 22px; margin: 0 0 16px; }

        .row { display: flex; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; align-items: center; }
        .row > label.inline { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--neutral-400); width: 110px; flex-shrink: 0; }
        .row input[type=number], .row input[type=text] { flex: 1; min-width: 120px; margin-bottom: 0; }
        .row-check { display: flex; align-items: center; gap: 8px; font-size: 13px; }

        .sizes-row { display: flex; gap: 14px; align-items: center; font-size: 13px; flex-wrap: wrap; margin: 6px 0 12px; }
        .sizes-row label { display: flex; align-items: center; gap: 5px; font-family: var(--font-mono); }

        .save-btn { background: var(--bg-dark); color: var(--text-on-dark); margin-top: 10px; }
        .save-btn:hover { background: var(--neutral-900); }
        .status { font-family: var(--font-mono); font-size: 11px; margin-left: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .error { color: var(--danger); font-size: 13px; margin-top: 8px; }

        .order-card { background: #fff; border-radius: var(--radius-md); padding: 20px 24px; margin-bottom: 14px; box-shadow: var(--shadow-sm); }
        .order-top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
        .order-id { font-family: var(--font-mono); font-size: 11px; color: var(--neutral-400); letter-spacing: 0.5px; }
        .order-total { font-family: var(--font-display); font-size: 20px; }
        .order-customer { font-size: 13px; color: var(--text-on-light-muted); margin-bottom: 10px; line-height: 1.5; }
        .order-items { font-size: 13px; margin-bottom: 12px; line-height: 1.6; }
        .order-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .pay-pill { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: var(--radius-full); }
        .pay-pill.paid { background: rgba(77,110,82,0.15); color: var(--ok); }
        .pay-pill.awaiting { background: rgba(184,84,63,0.15); color: var(--danger-bright); }

        .empty-note { color: var(--neutral-400); font-size: 13px; font-family: var(--font-mono); padding: 20px 0; }
    </style>
</head>
<body>

<div class="nav">
    <div class="nav-title">LOA — Admin</div>
    <div class="nav-links"><a href="index.html">На сайт</a><a href="#" id="logout-link">Выйти</a></div>
</div>

<div class="login-box" id="login-box">
    <h2>Вход</h2>
    <label class="field-label">Email</label>
    <input type="email" id="login-email" placeholder="you@loashop.ru">
    <label class="field-label">Пароль</label>
    <input type="password" id="login-pass" placeholder="••••••••">
    <button class="btn-primary" onclick="doLogin()">Войти</button>
    <div class="error" id="login-error"></div>
</div>

<div class="wrap" id="admin-wrap" style="display:none;">

    <div class="section-label">Общие настройки</div>
    <div class="card">
        <div class="row"><label class="inline">Скидка, %</label><input type="number" id="set-discount" min="0" max="100"></div>
        <div class="row row-check"><input type="checkbox" id="set-timer"> <span>Таймер промо включён</span></div>
        <button class="save-btn" onclick="saveSettings()">Сохранить</button>
        <span class="status" id="settings-status"></span>
    </div>

    <div class="section-label" style="display:flex; justify-content:space-between; align-items:center;">
        <span>Заказы</span>
        <button class="btn-ghost" onclick="loadOrders()" style="text-transform:none; letter-spacing:1px;">↻ Обновить</button>
    </div>
    <div id="orders-list"><div class="empty-note">Загрузка заказов…</div></div>

    <div class="section-label">Товары</div>
    <div id="products-list"></div>

    <div class="section-label">Добавить товар</div>
    <div class="card" id="new-product-card">
        <label class="field-label">Название</label>
        <input type="text" id="np-name" placeholder='Например: Худи "Loa" Grey'>
        <label class="field-label">Подзаголовок (курсив под названием в карточке)</label>
        <input type="text" id="np-subtitle" placeholder="Худи LOA — Grey Edition">
        <div class="row">
            <div style="flex:1;"><label class="field-label">Цена, ₽</label><input type="number" id="np-price"></div>
            <div style="flex:1;"><label class="field-label">Старая цена</label><input type="number" id="np-old-price"></div>
        </div>
        <label class="field-label">Фото — по одной ссылке на строку, первая = обложка</label>
        <textarea id="np-photos" placeholder="assets/photo1.jpg&#10;https://.../photo2.jpg"></textarea>
        <label class="field-label">Вступительный текст — по абзацу на строку</label>
        <textarea id="np-intro"></textarea>
        <label class="field-label">Детали — по пункту на строку</label>
        <textarea id="np-details" placeholder="Цвет: серый&#10;Крой: свободный оверсайз"></textarea>
        <label class="field-label">Материал — по пункту на строку</label>
        <textarea id="np-material"></textarea>
        <div class="row">
            <div style="flex:1;">
                <label class="field-label">Есть размеры?</label>
                <select id="np-has-size"><option value="true">Да (S/M/L)</option><option value="false">Нет</option></select>
            </div>
            <div style="flex:1;">
                <label class="field-label">Таблица размеров</label>
                <select id="np-size-guide"><option value="">Без таблицы</option><option value="tee">Футболка</option><option value="hoodie">Худи</option></select>
            </div>
        </div>
        <label class="field-label">Заметка о производстве</label>
        <textarea id="np-note" placeholder="Изделие производится под заказ.&#10;Срок отправки — до 14 дней после оформления."></textarea>
        <button class="save-btn" onclick="createProduct()">Добавить товар</button>
        <span class="status" id="new-product-status"></span>
    </div>

</div>

<script>
const SUPABASE_URL = 'https://ijtdynoghdrkevggwrbe.supabase.co';
const SUPABASE_KEY = 'sb_publishable_vxvg7KTexbn20chFrLjJ5Q_DjgY35rB';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
}

// Показ UI — не граница безопасности сама по себе (это RLS/admins), но не должен
// открываться для любого зарегистрированного покупателя.
async function checkSession() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return showLogin();
    const { data: admin } = await supabaseClient.from('admins').select('user_id').eq('user_id', session.user.id).maybeSingle();
    if (!admin) {
        await supabaseClient.auth.signOut();
        return showLogin();
    }
    showAdmin();
}

function showLogin() {
    document.getElementById('login-box').style.display = 'block';
    document.getElementById('admin-wrap').style.display = 'none';
}

async function showAdmin() {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    await loadSettings();
    await loadProducts();
    await loadOrders();
}

async function doLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-pass').value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
        document.getElementById('login-error').textContent = 'Неверный email или пароль';
        return;
    }
    document.getElementById('login-error').textContent = '';
    showAdmin();
}

document.getElementById('logout-link').addEventListener('click', async (e) => {
    e.preventDefault();
    await supabaseClient.auth.signOut();
    showLogin();
});

async function loadSettings() {
    const { data, error } = await supabaseClient.from('settings').select('*').eq('id', 1).single();
    if (error) return;
    document.getElementById('set-discount').value = data.global_discount || 0;
    document.getElementById('set-timer').checked = !!data.promo_timer_enabled;
}

async function saveSettings() {
    const global_discount = parseInt(document.getElementById('set-discount').value) || 0;
    const promo_timer_enabled = document.getElementById('set-timer').checked;
    const { error } = await supabaseClient.from('settings').update({ global_discount, promo_timer_enabled }).eq('id', 1);
    const status = document.getElementById('settings-status');
    status.textContent = error ? 'Ошибка' : 'Сохранено';
    status.style.color = error ? 'var(--danger)' : 'var(--ok)';
    setTimeout(() => status.textContent = '', 2000);
}

async function loadProducts() {
    const { data: products, error: pErr } = await supabaseClient.from('products').select('*').order('id');
    const { data: sizes } = await supabaseClient.from('sizes').select('*').order('id');
    if (pErr || !products) return;
    const sizesData = sizes || [];

    document.getElementById('products-list').innerHTML = products.map(p => {
        const pSizes = sizesData.filter(s => s.product_id === p.id);
        const sizesHtml = pSizes.length ? `
            <div class="row"><label class="inline">Размеры</label>
                <div class="sizes-row">
                    ${pSizes.map(s => `
                        <label>
                            <input type="checkbox" data-size-id="${s.id}" ${!s.hidden ? 'checked' : ''}> ${s.size}
                        </label>
                    `).join('')}
                </div>
            </div>` : '';

        return `
        <div class="card" data-product-id="${p.id}">
            <div class="card-tag">Экспонат ${String(p.id).padStart(3,'0')}</div>
            <h3>${escapeHtml(p.name) || ('Товар #' + p.id)}</h3>
            <div class="row"><label class="inline">Цена, ₽</label><input type="number" class="f-price" value="${p.price_rub}"></div>
            <div class="row"><label class="inline">Старая цена</label><input type="number" class="f-old-price" value="${p.old_price ?? ''}"></div>
            <div class="row row-check"><input type="checkbox" class="f-sold-out" ${p.sold_out ? 'checked' : ''}> <span>Распродано</span></div>
            <div class="row"><label class="inline">Бейдж</label><input type="text" class="f-badge" value="${p.badge || ''}" placeholder="напр. NEW"></div>
            ${sizesHtml}
            <div style="display:flex; gap:10px; align-items:center; margin-top:8px;">
                <button class="save-btn" onclick="saveProduct(${p.id}, this)">Сохранить</button>
                <button class="btn-danger" onclick="deleteProduct(${p.id}, this)">Удалить товар</button>
                <span class="status"></span>
            </div>
        </div>`;
    }).join('');
}

async function saveProduct(id, btn) {
    const card = btn.closest('.card');
    const price_rub = parseInt(card.querySelector('.f-price').value) || 0;
    const oldRaw = card.querySelector('.f-old-price').value;
    const old_price = oldRaw ? parseInt(oldRaw) : null;
    const sold_out = card.querySelector('.f-sold-out').checked;
    const badge = card.querySelector('.f-badge').value || null;

    const { error } = await supabaseClient.from('products').update({ price_rub, old_price, sold_out, badge }).eq('id', id);

    let sizeError = false;
    for (const cb of card.querySelectorAll('[data-size-id]')) {
        const sizeId = cb.getAttribute('data-size-id');
        const hidden = !cb.checked;
        const { error: sErr } = await supabaseClient.from('sizes').update({ hidden }).eq('id', sizeId);
        if (sErr) sizeError = true;
    }

    const status = card.querySelector('.status');
    status.textContent = (error || sizeError) ? 'Ошибка' : 'Сохранено';
    status.style.color = (error || sizeError) ? 'var(--danger)' : 'var(--ok)';
    setTimeout(() => status.textContent = '', 2000);
}

async function deleteProduct(id, btn) {
    if (!confirm('Удалить товар безвозвратно? Это уберёт его из каталога на сайте.')) return;
    const card = btn.closest('.card');
    await supabaseClient.from('sizes').delete().eq('product_id', id);
    const { error } = await supabaseClient.from('products').delete().eq('id', id);
    if (error) {
        alert('Не удалось удалить: ' + error.message);
        return;
    }
    card.remove();
}

async function createProduct() {
    const status = document.getElementById('new-product-status');
    const name = document.getElementById('np-name').value.trim();
    const price_rub = parseInt(document.getElementById('np-price').value) || 0;
    if (!name || !price_rub) {
        status.textContent = 'Укажите название и цену';
        status.style.color = 'var(--danger)';
        return;
    }
    const old_price = parseInt(document.getElementById('np-old-price').value) || null;
    const photos = document.getElementById('np-photos').value.split('\n').map(s => s.trim()).filter(Boolean);
    const has_size = document.getElementById('np-has-size').value === 'true';

    const { data: inserted, error } = await supabaseClient.from('products').insert({
        name,
        subtitle: document.getElementById('np-subtitle').value.trim(),
        price_rub, old_price,
        photos,
        has_size,
        intro: document.getElementById('np-intro').value,
        details: document.getElementById('np-details').value,
        material: document.getElementById('np-material').value,
        size_guide: document.getElementById('np-size-guide').value,
        production_note: document.getElementById('np-note').value,
        sold_out: false
    }).select().single();

    if (error) {
        status.textContent = 'Ошибка: ' + error.message;
        status.style.color = 'var(--danger)';
        return;
    }

    if (has_size) {
        await supabaseClient.from('sizes').insert(['S','M','L'].map(size => ({ product_id: inserted.id, size, hidden: false })));
    }

    status.textContent = 'Товар добавлен';
    status.style.color = 'var(--ok)';
    ['np-name','np-subtitle','np-price','np-old-price','np-photos','np-intro','np-details','np-material','np-note'].forEach(id => document.getElementById(id).value = '');
    await loadProducts();
    setTimeout(() => status.textContent = '', 3000);
}

// Вокабуляр статусов — как в личном кабинете покупателя (cabinet.html), а не придуманный отдельно.
const ORDER_STATUS_LABELS = { new: 'Новый', bought: 'Выкуплено', shipped: 'Отправлено', delivered: 'Доставлено', cancelled: 'Отменён', refund: 'Возврат' };

async function loadOrders() {
    const list = document.getElementById('orders-list');
    list.innerHTML = '<div class="empty-note">Загрузка заказов…</div>';
    const { data, error } = await supabaseClient.from('orders').select('*').neq('status', 'cancelled').order('created_at', { ascending: false }).limit(200);
    if (error) {
        list.innerHTML = `<div class="empty-note">Не удалось загрузить заказы: ${error.message}</div>`;
        return;
    }
    if (!data.length) {
        list.innerHTML = '<div class="empty-note">Заказов пока нет.</div>';
        return;
    }
    list.innerHTML = data.map(o => renderOrderCard(o)).join('');
}

function renderOrderCard(o) {
    const customer = [o.name, o.phone, o.tg].filter(Boolean).map(escapeHtml).join(' · ');
    const statusOptions = Object.keys(ORDER_STATUS_LABELS).map(s =>
        `<option value="${s}" ${(o.status || 'new') === s ? 'selected' : ''}>${ORDER_STATUS_LABELS[s]}</option>`
    ).join('');
    return `
    <div class="order-card" data-order-id="${o.id}">
        <div class="order-top">
            <span class="order-id">№ ${o.id.slice(-6).toUpperCase()}</span>
            <span class="pay-pill ${o.payment_status === 'paid' ? 'paid' : 'awaiting'}">${o.payment_status === 'paid' ? 'Оплачен' : 'Ожидает оплаты'}</span>
            <span class="order-total">${escapeHtml(o.total) || '—'}</span>
        </div>
        <div class="order-customer">${customer || 'Гость'}${o.pvz ? ' · ПВЗ: ' + escapeHtml(o.pvz) : ''}</div>
        <div class="order-items">${escapeHtml(o.items) || '—'}</div>
        <div class="order-customer" style="margin-bottom:0;">${escapeHtml(o.date)}</div>
        <div class="order-controls" style="margin-top:10px;">
            <select style="width:auto; margin-bottom:0;" onchange="updateOrderStatus('${o.id}', this.value, this)">${statusOptions}</select>
            <span class="status"></span>
        </div>
    </div>`;
}

async function updateOrderStatus(id, status, select) {
    const { error } = await supabaseClient.from('orders').update({ status, status_updated_at: new Date().toISOString() }).eq('id', id);
    if (error) {
        alert('Не удалось изменить статус: ' + error.message);
        return;
    }
    if (status === 'cancelled') {
        select.closest('.order-card').remove();
        return;
    }
    const statusEl = select.closest('.order-controls').querySelector('.status');
    statusEl.textContent = 'Сохранено';
    statusEl.style.color = 'var(--ok)';
    setTimeout(() => statusEl.textContent = '', 2000);
}

checkSession();
</script>
</body>
</html>
